<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Menghitung Nilai</title>
    </head>

    <body>

        <h1>Menghitung Nilai</h1>

        <form method="post" action="HitungNilai">

            <table>

                <tr>
                    <td>Jumlah hadir</td>
                    <td>
                        <input type="text"
                               name="hadir"
                               size="25">
                    </td>
                </tr>

                <tr>
                    <td>Jumlah pertemuan</td>
                    <td>
                        <input type="text"
                               name="pertemuan"
                               size="25">
                    </td>
                </tr>

                <tr>
                    <td>Nilai tugas</td>
                    <td>
                        <input type="text"
                               name="tugas"
                               size="25">
                    </td>
                </tr>

                <tr>
                    <td>Nilai UTS</td>
                    <td>
                        <input type="text"
                               name="uts"
                               size="25">
                    </td>
                </tr>

                <tr>
                    <td>Nilai UAS</td>
                    <td>
                        <input type="text"
                               name="uas"
                               size="25">
                    </td>
                </tr>

                <tr>
                    <td>Nilai Akhir</td>
                    <td>
                        <input type="text"
                               name="akhir"
                               size="25"
                               value="NaN"
                               readonly>
                    </td>
                </tr>

                <tr>
                    <td>Grade</td>
                    <td>
                        <input type="text"
                               name="grade"
                               size="25"
                               value="X"
                               readonly>
                    </td>
                </tr>

                <tr>
                    <td>Status</td>
                    <td>
                        <input type="text"
                               name="status"
                               size="25"
                               value="X"
                               readonly>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit"
                               value="Hitung">
                    </td>
                </tr>

            </table>

        </form>

    </body>
</html>
